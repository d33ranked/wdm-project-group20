services:
  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: gateway:latest
    restart: on-failure
    ports:
      - "8001:8000"
    environment:
      - REQUEST_TIMEOUT_MS=30000
      - KAFKA_BOOTSTRAP_SERVERS=kafka-external:9092
    env_file:
      - env/kafka.env
    depends_on:
      kafka-external:
        condition: service_healthy

  # nginx sits in front and proxies everything to the api-gateway
  nginx:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - api-gateway

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    environment:
      - CHECKOUT_MODE=SAGA
      - KAFKA_BOOTSTRAP_SERVERS=kafka-external:9092
      - INTERNAL_KAFKA_BOOTSTRAP_SERVERS=kafka-internal:9092
      - POSTGRES_HOSTS=order-db-1,order-db-2
      - PATRONI_PORT=8008
      - POSTGRES_PORT=5432
      - POSTGRES_DB=orders
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    depends_on:
      order-db-1:
        condition: service_started
      order-db-2:
        condition: service_started
      kafka-external:
        condition: service_healthy
      kafka-internal:
        condition: service_healthy

  order-db-1:
    build: ./patroni
    image: patroni:latest
    restart: always
    environment:
      - PATRONI_NAME=order-db-1
    volumes:
      - ./patroni/patroni-order.yml:/etc/patroni/patroni.yml:ro
      - ./order/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./order/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  order-db-2:
    build: ./patroni
    image: patroni:latest
    restart: always
    environment:
      - PATRONI_NAME=order-db-2
    volumes:
      - ./patroni/patroni-order.yml:/etc/patroni/patroni.yml:ro
      - ./order/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./order/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    environment:
      - CHECKOUT_MODE=SAGA
      - KAFKA_BOOTSTRAP_SERVERS=kafka-external:9092
      - INTERNAL_KAFKA_BOOTSTRAP_SERVERS=kafka-internal:9092
      - POSTGRES_HOSTS=stock-db-1,stock-db-2
      - PATRONI_PORT=8008
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    depends_on:
      stock-db-1:
        condition: service_started
      stock-db-2:
        condition: service_started
      kafka-external:
        condition: service_healthy
      kafka-internal:
        condition: service_healthy

  stock-db-1:
    build: ./patroni
    image: patroni:latest
    restart: always
    environment:
      - PATRONI_NAME=stock-db-1
    volumes:
      - ./patroni/patroni-stock.yml:/etc/patroni/patroni.yml:ro
      - ./stock/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./stock/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  stock-db-2:
    build: ./patroni
    image: patroni:latest
    restart: always
    environment:
      - PATRONI_NAME=stock-db-1
    volumes:
      - ./patroni/patroni-stock.yml:/etc/patroni/patroni.yml:ro
      - ./stock/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./stock/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: payment:latest
    environment:
      - CHECKOUT_MODE=SAGA
      - KAFKA_BOOTSTRAP_SERVERS=kafka-external:9092
      - INTERNAL_KAFKA_BOOTSTRAP_SERVERS=kafka-internal:9092
      - POSTGRES_HOSTS=payment-db-1,payment-db-2
      - PATRONI_PORT=8008
      - POSTGRES_PORT=5432
      - POSTGRES_DB=payments
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    depends_on:
      payment-db-1:
        condition: service_started
      payment-db-2:
        condition: service_started
      kafka-external:
        condition: service_healthy
      kafka-internal:
        condition: service_healthy

  payment-db-1:
    build: ./patroni
    image: patroni:latest
    restart: always
    environment:
      - PATRONI_NAME=payment-db-1
    volumes:
      - ./patroni/patroni-payment.yml:/etc/patroni/patroni.yml:ro
      - ./payment/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./payment/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  payment-db-2:
    build: ./patroni
    image: patroni:latest
    restart: always
    environment:
      - PATRONI_NAME=payment-db-2
    volumes:
      - ./patroni/patroni-payment.yml:/etc/patroni/patroni.yml:ro
      - ./payment/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./payment/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  # etcd cluster for Patroni leader election
  # TODO: Remove code duplication
  etcd1:
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      - ETCD_NAME=etcd1
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd1:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd1:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster

  etcd2:
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      - ETCD_NAME=etcd2
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd2:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd2:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster

  etcd3:
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      - ETCD_NAME=etcd3
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd3:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster

  kafka-external:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-external:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-external:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
    env_file:
      - env/kafka.env
    volumes:
      - kafka_data:/apache/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  kafka-internal:
    image: apache/kafka:latest
    ports:
      - "9093:9094"
    environment:
      - KAFKA_LISTENERS=PLAINTEXT://:9092,HOST://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-internal:9092,HOST://localhost:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-internal:9093
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
    volumes:
      - kafka_internal_data:/apache/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      kafka-external:
        condition: service_healthy
      kafka-internal:
        condition: service_healthy
    environment:
      - KAFKA_CLUSTERS_0_NAME=external
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka-external:9092
      - KAFKA_CLUSTERS_1_NAME=internal
      - KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS=kafka-internal:9092

volumes:
  kafka_data:
  kafka_internal_data: