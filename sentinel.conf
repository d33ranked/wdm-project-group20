port 26379

# required for docker: store and announce hostnames instead of IPs
# without this sentinel broadcasts replica IPs after failover which docker
# services cannot route to by name
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# redis-order
sentinel monitor redis-order redis-order 6379 2
sentinel down-after-milliseconds redis-order 5000
sentinel failover-timeout redis-order 30000
sentinel parallel-syncs redis-order 1

# redis-stock
sentinel monitor redis-stock redis-stock 6379 2
sentinel down-after-milliseconds redis-stock 5000
sentinel failover-timeout redis-stock 30000
sentinel parallel-syncs redis-stock 1

# redis-payment
sentinel monitor redis-payment redis-payment 6379 2
sentinel down-after-milliseconds redis-payment 5000
sentinel failover-timeout redis-payment 30000
sentinel parallel-syncs redis-payment 1

# redis-bus
sentinel monitor redis-bus redis-bus 6379 2
sentinel down-after-milliseconds redis-bus 5000
sentinel failover-timeout redis-bus 30000
sentinel parallel-syncs redis-bus 1